<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceAgentRAG — 智能语音客服</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242736;
    --border: #2e3145;
    --text: #e4e4e7;
    --text-dim: #8b8d9e;
    --accent: #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.3);
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── Header ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  .status-dot.offline { background: var(--red); animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .header-info {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-voice { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-text { background: rgba(245,158,11,0.15); color: var(--orange); }
  .badge-echo { background: rgba(239,68,68,0.15); color: var(--red); }

  /* ─── Chat Area ─── */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 14px;
    position: relative;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-user {
    align-self: flex-end;
    background: var(--accent);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg-agent {
    align-self: flex-start;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg-system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 12px;
  }
  .msg-transfer {
    align-self: center;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--red);
    text-align: center;
  }

  .msg-meta {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .msg-agent .msg-meta { color: #6b6d7e; }
  .msg-user .msg-meta { color: rgba(255,255,255,0.6); }

  .emotion-tag {
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
  }
  .emotion-neutral { background: rgba(139,141,158,0.2); }
  .emotion-angry { background: rgba(239,68,68,0.2); color: var(--red); }
  .emotion-happy { background: rgba(34,197,94,0.2); color: var(--green); }
  .emotion-confused { background: rgba(245,158,11,0.2); color: var(--orange); }
  .emotion-sad { background: rgba(99,102,241,0.2); color: var(--accent); }

  /* ─── Confirm Bar ─── */
  .confirm-bar {
    align-self: center;
    background: var(--surface2);
    border: 1px solid var(--orange);
    border-radius: var(--radius);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .confirm-bar button {
    padding: 6px 16px;
    border-radius: 6px;
    border: none;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-confirm { background: var(--green); color: white; }
  .btn-reject { background: var(--red); color: white; }

  /* ─── Input Area ─── */
  #input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 12px;
    align-items: center;
  }
  #text-input {
    flex: 1;
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #text-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  #text-input::placeholder { color: var(--text-dim); }

  .btn-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 18px;
  }
  .btn-send {
    background: var(--accent);
    color: white;
  }
  .btn-send:hover { filter: brightness(1.15); }
  .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-mic {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-mic:hover { border-color: var(--accent); color: var(--accent); }
  .btn-mic.recording {
    background: rgba(239,68,68,0.15);
    border-color: var(--red);
    color: var(--red);
    animation: pulse 1s infinite;
  }

  /* ─── Thinking indicator ─── */
  .thinking {
    display: flex;
    gap: 4px;
    padding: 16px;
    align-self: flex-start;
  }
  .thinking span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.4s infinite ease-in-out;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  /* ─── Scrollbar ─── */
  #chat-area::-webkit-scrollbar { width: 6px; }
  #chat-area::-webkit-scrollbar-track { background: transparent; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>
    <div class="status-dot" id="status-dot"></div>
    🎙️ VoiceAgentRAG 智能客服
  </h1>
  <div class="header-info">
    <span id="mode-badge" class="badge badge-text">文字模式</span>
    <span id="llm-badge" class="badge">LLM</span>
    <span id="session-id" style="font-family: monospace;"></span>
  </div>
</header>

<div id="chat-area"></div>

<div id="input-area">
  <button class="btn-icon btn-mic" id="btn-mic" title="按住说话（需语音模型）">🎤</button>
  <input type="text" id="text-input" placeholder="输入消息，按 Enter 发送..." autocomplete="off" />
  <button class="btn-icon btn-send" id="btn-send" title="发送">➤</button>
</div>

<script>
const chatArea = document.getElementById('chat-area');
const textInput = document.getElementById('text-input');
const btnSend = document.getElementById('btn-send');
const btnMic = document.getElementById('btn-mic');
const statusDot = document.getElementById('status-dot');
const modeBadge = document.getElementById('mode-badge');
const llmBadge = document.getElementById('llm-badge');
const sessionIdEl = document.getElementById('session-id');

let ws = null;
let voiceMode = false;
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];

// ─── WebSocket 连接 ───
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/chat`);

  ws.onopen = () => {
    statusDot.classList.remove('offline');
    addSystemMsg('正在连接服务...');
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    handleMessage(msg);
  };

  ws.onclose = () => {
    statusDot.classList.add('offline');
    addSystemMsg('连接已断开，5秒后重连...');
    setTimeout(connect, 5000);
  };

  ws.onerror = () => {
    statusDot.classList.add('offline');
  };
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'status':
      addSystemMsg(msg.message);
      if (msg.session_id) sessionIdEl.textContent = msg.session_id.slice(0, 8);
      if (msg.voice_mode !== undefined) {
        voiceMode = msg.voice_mode;
        updateModeBadge();
      }
      break;

    case 'transcript':
      // STT 转写结果显示
      addSystemMsg(`🎤 识别: "${msg.text}" [${msg.emotion}]`);
      break;

    case 'reply':
      removeThinking();
      addAgentMsg(msg.text, msg.emotion, msg.intent, msg.timing_ms);
      if (msg.transferred) {
        addTransferMsg(msg.text);
      }
      // TTS 播放
      if (msg.audio) {
        playAudio(msg.audio);
      } else if (!voiceMode) {
        speakTTS(msg.text);
      }
      break;

    case 'audio':
      if (msg.audio) playAudio(msg.audio);
      break;

    case 'audio_chunk':
      if (msg.audio) enqueueAudioChunk(msg.audio);
      break;

    case 'audio_end':
      finishAudioStream();
      break;

    case 'confirm':
      addConfirmBar(msg.tool_name, msg.description);
      break;

    case 'error':
      addSystemMsg(`❌ 错误: ${msg.message}`);
      removeThinking();
      break;
  }
}

// ─── 发送消息 ───
function sendText() {
  const text = textInput.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  addUserMsg(text);
  ws.send(JSON.stringify({ type: 'text', text }));
  textInput.value = '';
  addThinking();
}

textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
});
btnSend.addEventListener('click', sendText);

// ─── 语音录制 ───
btnMic.addEventListener('mousedown', startRecording);
btnMic.addEventListener('mouseup', stopRecording);
btnMic.addEventListener('mouseleave', stopRecording);
// 移动端
btnMic.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
btnMic.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });

// Web Speech API 识别器（浏览器内置 STT，无需服务端模型）
let speechRecognition = null;
let useBrowserSTT = false;  // 无服务端语音模型时启用

function initBrowserSTT() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return false;

  speechRecognition = new SpeechRecognition();
  speechRecognition.lang = 'zh-CN';
  speechRecognition.interimResults = true;
  speechRecognition.continuous = false;

  speechRecognition.onresult = (event) => {
    let final = '';
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        final += t;
      } else {
        interim += t;
      }
    }
    // 实时显示中间结果
    if (interim) {
      updateLiveTranscript(interim);
    }
    if (final) {
      removeLiveTranscript();
      addUserMsg(`🎤 ${final}`);
      ws.send(JSON.stringify({ type: 'text', text: final }));
      addThinking();
    }
  };

  speechRecognition.onerror = (event) => {
    removeLiveTranscript();
    if (event.error !== 'no-speech') {
      addSystemMsg(`⚠️ 语音识别错误: ${event.error}`);
    }
    isRecording = false;
    btnMic.classList.remove('recording');
  };

  speechRecognition.onend = () => {
    removeLiveTranscript();
    isRecording = false;
    btnMic.classList.remove('recording');
  };

  return true;
}

function updateLiveTranscript(text) {
  let el = document.getElementById('live-transcript');
  if (!el) {
    el = document.createElement('div');
    el.id = 'live-transcript';
    el.className = 'msg msg-system';
    el.style.color = 'var(--accent)';
    chatArea.appendChild(el);
  }
  el.textContent = `🎤 ${text}...`;
  scrollBottom();
}

function removeLiveTranscript() {
  const el = document.getElementById('live-transcript');
  if (el) el.remove();
}

async function startRecording() {
  if (isRecording) return;

  // 如果没有服务端语音模型，使用浏览器 Web Speech API
  if (!voiceMode) {
    if (!speechRecognition && !initBrowserSTT()) {
      addSystemMsg('⚠️ 当前浏览器不支持语音识别，请使用 Chrome');
      return;
    }
    useBrowserSTT = true;
    isRecording = true;
    btnMic.classList.add('recording');
    speechRecognition.start();
    addSystemMsg('🎤 正在听...(浏览器语音识别)');
    return;
  }

  // 服务端语音模型可用时，录制 PCM 发送
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true }
    });

    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());

      if (audioChunks.length === 0) return;

      const blob = new Blob(audioChunks, { type: 'audio/webm' });

      // 转为 PCM 发送
      const arrayBuffer = await blob.arrayBuffer();
      const audioCtx = new AudioContext({ sampleRate: 16000 });
      const decoded = await audioCtx.decodeAudioData(arrayBuffer);
      const pcm = decoded.getChannelData(0);

      // Float32 → Int16 PCM
      const int16 = new Int16Array(pcm.length);
      for (let i = 0; i < pcm.length; i++) {
        const s = Math.max(-1, Math.min(1, pcm[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }

      const base64 = arrayBufferToBase64(int16.buffer);
      ws.send(JSON.stringify({ type: 'audio', data: base64, sample_rate: 16000 }));

      addUserMsg('🎤 [语音消息]');
      addThinking();
      audioCtx.close();
    };

    mediaRecorder.start();
    isRecording = true;
    btnMic.classList.add('recording');
  } catch (err) {
    addSystemMsg(`⚠️ 麦克风不可用: ${err.message}`);
  }
}

function stopRecording() {
  if (!isRecording) return;

  if (useBrowserSTT && speechRecognition) {
    speechRecognition.stop();
    useBrowserSTT = false;
    return;
  }

  if (mediaRecorder) {
    mediaRecorder.stop();
  }
  isRecording = false;
  btnMic.classList.remove('recording');
}

// ─── TTS 播放 ───
function playAudio(base64Pcm) {
  try {
    const raw = atob(base64Pcm);
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);

    const int16 = new Int16Array(bytes.buffer);
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) {
      float32[i] = int16[i] / 32768.0;
    }

    const ctx = new AudioContext({ sampleRate: 24000 });
    const buffer = ctx.createBuffer(1, float32.length, 24000);
    buffer.getChannelData(0).set(float32);
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);
    source.start();
    source.onended = () => ctx.close();
  } catch (e) {
    console.warn('Audio playback failed:', e);
  }
}

// ─── 流式 TTS：按到达顺序排队播放 ───
let streamCtx = null;
let streamNextStart = 0;

function ensureStreamCtx() {
  if (!streamCtx || streamCtx.state === 'closed') {
    streamCtx = new AudioContext({ sampleRate: 24000 });
    streamNextStart = 0;
  }
  return streamCtx;
}

function enqueueAudioChunk(base64Pcm) {
  try {
    const raw = atob(base64Pcm);
    const bytes = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
    const int16 = new Int16Array(bytes.buffer);
    if (int16.length === 0) return;
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

    const ctx = ensureStreamCtx();
    const buffer = ctx.createBuffer(1, float32.length, 24000);
    buffer.getChannelData(0).set(float32);
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);

    const now = ctx.currentTime;
    const startAt = Math.max(now + 0.02, streamNextStart);
    source.start(startAt);
    streamNextStart = startAt + buffer.duration;
  } catch (e) {
    console.warn('Audio chunk failed:', e);
  }
}

function finishAudioStream() {
  if (!streamCtx) return;
  const ctx = streamCtx;
  const tail = Math.max(0, streamNextStart - ctx.currentTime);
  streamCtx = null;
  streamNextStart = 0;
  setTimeout(() => { try { ctx.close(); } catch (e) {} }, (tail + 0.1) * 1000);
}

function speakTTS(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 1.1;
  speechSynthesis.speak(u);
}

// ─── UI 辅助函数 ───
function addUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  div.innerHTML = `<div>${escapeHtml(text)}</div>
    <div class="msg-meta"><span>${timeStr()}</span></div>`;
  chatArea.appendChild(div);
  scrollBottom();
}

function addAgentMsg(text, emotion, intent, timingMs) {
  const div = document.createElement('div');
  div.className = 'msg msg-agent';
  const emotionClass = `emotion-${emotion || 'neutral'}`;
  const emotionEmoji = { neutral: '😐', angry: '😠', happy: '😊', confused: '😕', sad: '😢' }[emotion] || '😐';
  const intentLabel = { task: '任务', knowledge: '知识', chitchat: '闲聊', transfer: '转人工' }[intent] || intent;

  div.innerHTML = `<div>${escapeHtml(text)}</div>
    <div class="msg-meta">
      <span class="emotion-tag ${emotionClass}">${emotionEmoji} ${emotion || 'neutral'}</span>
      <span>${intentLabel}</span>
      <span>${timingMs ? timingMs + 'ms' : ''}</span>
      <span>${timeStr()}</span>
    </div>`;
  chatArea.appendChild(div);
  scrollBottom();
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.textContent = text;
  chatArea.appendChild(div);
  scrollBottom();
}

function addTransferMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-transfer';
  div.innerHTML = `🔄 已转接人工客服`;
  chatArea.appendChild(div);
  scrollBottom();
}

function addConfirmBar(toolName, desc) {
  const div = document.createElement('div');
  div.className = 'confirm-bar';
  div.innerHTML = `<span>⚠️ ${escapeHtml(toolName)}: ${escapeHtml(desc)}</span>
    <button class="btn-confirm" onclick="sendConfirm(true, this)">确认</button>
    <button class="btn-reject" onclick="sendConfirm(false, this)">拒绝</button>`;
  chatArea.appendChild(div);
  scrollBottom();
}

function sendConfirm(confirmed, btn) {
  ws.send(JSON.stringify({ type: 'confirm_response', confirmed }));
  btn.closest('.confirm-bar').remove();
}

function addThinking() {
  if (document.querySelector('.thinking')) return;
  const div = document.createElement('div');
  div.className = 'thinking';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatArea.appendChild(div);
  scrollBottom();
}

function removeThinking() {
  document.querySelectorAll('.thinking').forEach(el => el.remove());
}

function updateModeBadge() {
  modeBadge.textContent = voiceMode ? '🎤 语音模式' : '⌨️ 文字模式';
  modeBadge.className = `badge ${voiceMode ? 'badge-voice' : 'badge-text'}`;
}

function scrollBottom() {
  requestAnimationFrame(() => {
    chatArea.scrollTop = chatArea.scrollHeight;
  });
}

function timeStr() {
  return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function arrayBufferToBase64(buffer) {
  let binary = '';
  const bytes = new Uint8Array(buffer);
  for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

// ─── 初始化 ───
async function init() {
  statusDot.classList.add('offline');

  // 检查服务状态
  try {
    const resp = await fetch('/api/status');
    const status = await resp.json();

    llmBadge.textContent = status.llm_mode === 'echo' ? '🔸 Echo 模式' : '🟢 LLM';
    llmBadge.className = `badge ${status.llm_mode === 'echo' ? 'badge-echo' : 'badge-voice'}`;

    voiceMode = status.voice_mode;
    updateModeBadge();

    if (!voiceMode) {
      btnMic.title = '使用浏览器语音识别（Web Speech API）';
    }
  } catch (e) {
    addSystemMsg('⚠️ 无法获取服务状态');
  }

  connect();
  textInput.focus();
}

init();
</script>
</body>
</html>
